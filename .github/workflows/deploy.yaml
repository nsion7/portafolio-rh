name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Solo se activa cuando subes a main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload
        uses: withastro/action@v3 # Esta acción oficial de Astro hace todo el trabajo